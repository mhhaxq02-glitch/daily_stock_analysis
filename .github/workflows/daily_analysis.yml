、name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade litellm
      
      - name: 创建目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # ==========================================
          # 锁死 OpenAI 兼容接口（你要的这个！）
          # ==========================================
          AI_PROVIDER: openai
          AI_MODEL: deepseek-chat
          AI_BASE_URL: https://api.deepseek.com/v1
          AI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_TIMEOUT: '30'
          AI_MAX_RETRIES: '3'

          # ==========================================
          # 其他配置（保持不变）
          # ==========================================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          REPORT_TYPE: 'simple'
          LOG_LEVEL: INFO
          MAX_WORKERS: '1'
          ENABLE_CHIP_DISTRIBUTION: 'false'
          REALTIME_SOURCE_PRIORITY: 'tencent,akshare_sina,efinance,akshare_em'
          
        run: |
          # 强制锁死 OpenAI 兼容接口
          export LITELLM_PROVIDER="openai"
          export LITELLM_MODEL="deepseek-chat"
          export LITELLM_BASE_URL="https://api.deepseek.com/v1"
          export LITELLM_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          
          MODE="${{ github.event.inputs.mode || 'full' }}"
          
          echo "=========================================="
          echo "🚀 A股自选股智能分析系统"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 运行模式: $MODE"
          echo "📊 自选股: $STOCK_LIST"
          echo ""
          echo "【AI 配置】"
          echo "  OpenAI 兼容 Key: $([ -n "$AI_API_KEY" ] && echo '✅ 已配置' || echo '❌ 未配置')"
          echo "  API 地址: $AI_BASE_URL"
          echo "  AI 模型: $AI_MODEL"
          echo ""
          echo "【通知渠道】"
          echo "  Server酱3: $([ -n "$SERVERCHAN3_SENDKEY" ] && echo '✅ 已配置' || echo '❌ 未配置')"
          echo "=========================================="
          
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          python main.py $FORCE_RUN_ARG
      
      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
      
      - name: 显示结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 分析完成"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "生成的报告:"
            ls -la reports/
          else
            echo "⚠️ 未生成报告文件"
          fi
