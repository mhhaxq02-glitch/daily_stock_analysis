name: Test Secret Access

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test OPENAI_API_KEY access
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "✅ 成功读取到 OPENAI_API_KEY（长度: ${#OPENAI_API_KEY}）"
          else
            echo "❌ 密钥为空，请检查 Secret 名称是否为 OPENAI_API_KEY"
            exit 1
          fi
