name: 股票分析

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade litellm
      
      - name: 创建目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # 核心：DeepSeek 配置（100% 匹配你的 Secret）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          
          # 通知渠道
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          # 自选股
          STOCK_LIST: '601868,002261'
          # 数据源优先级（最稳）
          REALTIME_SOURCE_PRIORITY: 'tencent,akshare_sina,akshare_em,efinance'
          # 其他配置
          REPORT_TYPE: 'simple'
          LOG_LEVEL: INFO
          MAX_WORKERS: '1'
          
        run: |
          echo "=========================================="
          echo "🚀 全新开始：每日股票分析（DeepSeek 版）"
          echo "=========================================="
          echo "📊 自选股: $STOCK_LIST"
          echo ""
          echo "【DeepSeek 密钥验证】"
          echo "  API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✅ 已配置' || echo '❌ 未配置')"
          echo "  API 地址: $OPENAI_BASE_URL"
          echo "  模型: $OPENAI_MODEL"
          echo ""
          echo "【通知渠道】"
          echo "  Server酱3: $([ -n "$SERVERCHAN3_SENDKEY" ] && echo '✅ 已配置' || echo '❌ 未配置')"
          echo "=========================================="
          
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          python main.py $FORCE_RUN_ARG
      
      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
